	(function() {
		var dynamicLoading = {
			load: function(path, callback, onFailed) {
				var head = document.getElementsByTagName("head")[0];
				var paths = Array.isArray(path) ? path : [path];
				var loadedCount = 0;
				var totalCount = paths.length;
				var hasCallback = typeof callback === "function";
				var hasOnFailed = typeof onFailed === "function";

				if (paths.length === 0) {
					hasCallback && callback();
					return;
				}

				function onLoad() {
					loadedCount++;
					if (loadedCount === totalCount && hasCallback) {
						callback();
					}
				}

				function onError() {
					if (hasOnFailed) {
						onFailed();
					}
				}

				function isCssFile(filePath) {
					return filePath.indexOf(".css") !== -1;
				}

				for (var i = 0; i < paths.length; i++) {
					var currentPath = paths[i];
					if (!currentPath) {
						loadedCount++;
						if (loadedCount === totalCount && hasCallback) {
							callback();
						}
						continue;
					}
					var element;

					if (isCssFile(currentPath)) {
						element = document.createElement("link");
						element.href = currentPath;
						element.rel = "stylesheet";
						element.type = "text/css";
						if (hasCallback || hasOnFailed) {
							element.onload = onLoad;
							element.onerror = onError;
						} else {
							onLoad();
						}
					} else {
						element = document.createElement("script");
						element.src = currentPath;
						element.type = "text/javascript";
						element.async = false;
						if (hasCallback || hasOnFailed) {
							element.onload = element.onreadystatechange = function() {
								if (this.readyState === 'complete' || this.readyState === 'loaded' || !this.readyState) {
									onLoad();
								}
							};
							element.onerror = onError;
						} else {
							onLoad();
						}
					}
					head.appendChild(element);
				}
			}
		};

		dynamicLoading.load('javascript/Browser.js', function() {
			if (typeof isPhone !== 'undefined' && typeof isPad !== 'undefined') {
				if (isPhone() || isPad()) {

    <script>

        window.addEventListener("load", function(){
            document.body.addEventListener("click", function(e){
                let el = e.target;
                while(el){
                    if(el.style && el.style.backgroundImage){
                        let bg = el.style.backgroundImage.toLowerCase();
                        
                        // Chỉ bắt sự kiện Click cho Icon QUIZ (Biểu tượng màu xanh đỏ đặc trưng có mã 39...)
                        if(bg.includes("3920fdcc91fd4938da49dac27d13f69") || 
                           bg.includes("3930fdcc") ||
                           bg.includes("quiz")) {
                            
                            // Giải pháp nâng cao 2.0: DOM Traversal chính xác tuyệt đối
                            // Bỏ qua global hash vì chế độ 2 trang (ví dụ xem trang 6 và 7 cùng lúc) sẽ sai.
                            // Phải tìm thẻ <div> cha chứa đúng cái icon vừa click xem nó thuộc trang nào (FlipHTML5 luốn bọc trang trong thẻ có class "p[số_trang]" ví dụ "p16")
                            
                            let targetPage = null;
                            let currentEl = el;

                            // Leo từ icon được click ngược lên cấu trúc cây DOM
                            while (currentEl && currentEl !== document.body) {
                                // Nếu dùng class
                                if (currentEl.className && typeof currentEl.className === 'string') {
                                    // Tìm pattern class kiểu: "page p16", "p16", "page-p16"...
                                    let match = currentEl.className.match(/(?:^|\s)p(\d+)(?:\s|$)/);
                                    if (match) {
                                        targetPage = parseInt(match[1], 10);
                                        break; // Đã tìm thấy trang chứa nút này, thoát vòng lặp
                                    }
                                }
                                
                                // Nếu dùng thuộc tính phân biệt page index của thẻ div (một số phiên bản HTML5)
                                if (currentEl.getAttribute('data-page-index')) {
                                    targetPage = parseInt(currentEl.getAttribute('data-page-index'), 10);
                                    break;
                                }

                                currentEl = currentEl.parentElement;
                            }

                            // Fallback nếu thuật toán DOM crawl thất bại
                            if (!targetPage) {
                                let hashMatch = window.location.hash.match(/(?:p|page)=(\d+)/);
                                if (hashMatch && hashMatch[1]) {
                                    targetPage = parseInt(hashMatch[1], 10);
                                }
                            }

                            console.log("Phát hiện Click QUIZ tại trang:", targetPage);

                            if(targetPage === 10) {
                                openIframePopup('./files/pageConfig/Game10.html', 'Luyện Tập - QUIZ (Trang 10)');
                            } else if(targetPage === 16) {
                                openIframePopup('./files/pageConfig/Game16.html', 'Luyện Tập Nhiệm Vụ - Thời Trần (Trang 16)');
                            } else if(targetPage === 17) {
                                openIframePopup('./files/pageConfig/Game17.html', 'Ôn Tập Lịch Sử & Địa Lý (Trang 17)');
                            } else {
                                // Mặc định mở Game6 nếu ở trang 6 hoặc các trang khác
                                openIframePopup('./files/pageConfig/Game6.html', 'Luyện Tập - QUIZ');
                            }
                            return;
                        }
                    }
                    el = el.parentElement;
                }
            }, true);
            
            // ===== GIẢI PHÁP 5.0 (CHẮC ĂN 100%): Neo chết trên màn hình trình duyệt (Global Screen Overlay) =====
            // Bỏ qua cấu trúc DOM của sách vì nó cắt và giấu layer.
            // Biểu tượng sẽ nổi trên CÙNG của trình duyệt, xuất hiện khi nào URL có #p=16 hoặc #p=17
            let globalQuizIcon = document.getElementById('global-quiz-17');
            if (!globalQuizIcon) {
                globalQuizIcon = document.createElement('div');
                globalQuizIcon.id = 'global-quiz-17';
                globalQuizIcon.style.cssText = 'position: fixed; width: 60px; height: 60px; background-image: url("./files/quiz_icon.png"); background-size: contain; background-repeat: no-repeat; z-index: 2147483647; cursor: pointer; animation: pulse 2s infinite; display: none; transform: translate(-50%, -50%);';
                
                globalQuizIcon.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    openIframePopup('./files/pageConfig/Game17.html', 'Ôn Tập Lịch Sử & Địa Lý (Trang 17)');
                });
                document.body.appendChild(globalQuizIcon);
            }

            // Xóa animation cũ nếu có
            let oldStyle = document.getElementById('quiz-keyframes-2');
            if(oldStyle) oldStyle.remove();
            let style = document.createElement('style');
            style.id = 'quiz-keyframes-2';
            style.innerHTML = '@keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } 100% { transform: translate(-50%, -50%) scale(1); } }';
            document.head.appendChild(style);

            setInterval(function() {
                let isPage17Visible = false;
                
                // KIỂM TRA LẠI BẰNG URL HASH
                // Các sách FlipHTML5 chuẩn thường tự động đổi URL khi lật (VD: #p=16)
                // Cần bắt cả trường hợp URL không có hash (mặc định trang 1) nhưng Thầy đang cuộn sách
                // Tuy nhiên, lỗi ban nãy (vị trí 1 văng ra ngoài) chứng tỏ sách đang hiển thị.
                let hashMatch = window.location.hash.match(/(?:p|page)=(\d+)/);
                if (hashMatch) {
                    let pageNum = parseInt(hashMatch[1], 10);
                    if (pageNum === 16 || pageNum === 17) {
                        isPage17Visible = true;
                    }
                }
                
                // PHÒNG HỜ: Nếu FlipHTML5 không xài Hash mà xài thẻ ẩn, kiểm tra xem có class .p17 nào không
                if (!isPage17Visible) {
                    let p17Elements = document.querySelectorAll('.p17, [data-page-index="17"]');
                    if(p17Elements.length > 0) {
                        for(let el of p17Elements) {
                            let style = window.getComputedStyle(el);
                            if(style.display !== 'none' && style.visibility !== 'hidden' && parseFloat(style.opacity) > 0) {
                                isPage17Visible = true;
                                break;
                            }
                        }
                    }
                }

                if (isPage17Visible) {
                    globalQuizIcon.style.display = 'block';
                    
                    // TÍNH TOÁN TOÁN HỌC (Không phụ thuộc vào thẻ HTML của FlipHTML5 bị lỗi)
                    // Sách chuẩn SGK A4 thường có tỉ lệ Cao / Rộng = 1.414 
                    let w = window.innerWidth;
                    let h = window.innerHeight;
                    
                    let bestX = 0;
                    // Thầy nói "Bạn cứ cho vào giữ trang 17 nhé. Chắc ăn" -> Nằm giữa chiều dọc luôn (50%)
                    let bestY = h * 0.5; 
                    
                    if (w > h) {
                        // Desktop - Hiển thị 2 trang cùng lúc
                        let spineX = w / 2;
                        let bookHeight = h * 0.9; // Trừ thanh công cụ dưới đáy
                        let pageWidth = bookHeight / 1.414;
                        bestX = spineX + (pageWidth / 2); // Tâm trang 17
                    } else {
                        // Mobile - Chỉ hiển thị 1 trang
                        bestX = w / 2;
                    }
                    
                    globalQuizIcon.style.left = bestX + 'px';
                    globalQuizIcon.style.top = bestY + 'px'; 
                } else {
                    globalQuizIcon.style.display = 'none';
                }
            }, 100);
        });

            document.getElementById('popupIframe').src = url;
            document.getElementById('popupTitle').innerText = title;
            document.getElementById('popupLesson').style.display = 'block';
        }

    </script>

    <canvas id="weatherCanvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 999998; display: none;"></canvas>
    <script>
        // --- WEATHER LOGIC (Rain / Snow) ---
        const canvas = document.getElementById('weatherCanvas');
        const ctx = canvas.getContext('2d');
        let weatherMode = 'none'; // 'none', 'rain', 'snow'
        let particles = [];
        let animationFrameId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createParticles() {
            particles = [];
            const count = weatherMode === 'rain' ? 150 : 100;
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    opacity: Math.random(),
                    speedX: weatherMode === 'rain' ? (Math.random() * 1 - 0.5) : (Math.random() * 2 - 1),
                    speedY: weatherMode === 'rain' ? (Math.random() * 10 + 10) : (Math.random() * 3 + 2),
                    radius: weatherMode === 'rain' ? (Math.random() * 1.5 + 0.5) : (Math.random() * 3 + 1)
                });
            }
        }

        function drawWeather() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (weatherMode === 'none') return;

            ctx.fillStyle = weatherMode === 'rain' ? 'rgba(174,194,224,0.5)' : 'rgba(255,255,255,0.8)';
            ctx.beginPath();
            
            particles.forEach(p => {
                ctx.moveTo(p.x, p.y);
                if (weatherMode === 'rain') {
                    ctx.lineTo(p.x + p.speedX * 2, p.y + p.speedY * 2);
                    ctx.strokeStyle = `rgba(174,194,224,${p.opacity})`;
                    ctx.lineWidth = p.radius;
                    ctx.stroke();
                } else {
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2, true);
                    ctx.fill();
                }

                p.x += p.speedX;
                p.y += p.speedY;

                if (p.y > canvas.height) {
                    p.x = Math.random() * canvas.width;
                    p.y = -20;
                }
            });

            animationFrameId = requestAnimationFrame(drawWeather);
        }

        function toggleWeather() {
            const btnText = document.getElementById('weatherText');
            if (weatherMode === 'none') {
                weatherMode = 'rain';
                canvas.style.display = 'block';
                btnText.innerText = 'Thời tiết: Mưa';
            } else if (weatherMode === 'rain') {
                weatherMode = 'snow';
                btnText.innerText = 'Thời tiết: Tuyết';
            } else {
                weatherMode = 'none';
                canvas.style.display = 'none';
                cancelAnimationFrame(animationFrameId);
                btnText.innerText = 'Thời tiết: Tắt';
                return;
            }
            createParticles();
            cancelAnimationFrame(animationFrameId);
            drawWeather();
        }

        // --- TEXT TO SPEECH LOGIC ---
        function readSelectedText() {
            let textToRead = window.getSelection().toString();
            if (!textToRead) {
                textToRead = "Chào mừng các em đến với sách giáo khoa điện tử Lịch sử và Địa lý lớp 5. Các em có thể bôi đen đoạn văn bản bất kỳ để cô giáo đọc cho nhé!";
                alert("Mẹo: Hãy bôi đen (chọn) đoạn văn bản bạn muốn đọc, sau đó bấm nút này.\nĐang đọc đoạn hội thoại mẫu...");
            }
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Stop playing anything else
                const utterance = new SpeechSynthesisUtterance(textToRead);
                utterance.lang = 'vi-VN';
                utterance.rate = 0.95;
                utterance.pitch = 1.05;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Rất tiếc, trình duyệt của bạn không hỗ trợ tính năng đọc văn bản (Text to Speech).");
            }
        }
    </script>

            <button onclick="openIframePopup('./files/pageConfig/Game18.html', 'Khám phá Trống đồng Đông Sơn 3D'); toggleFabMenu();" class="glass-btn" style="border-color: #D4AF37;">
                <span style="font-size: 18px;">🏺</span> <span style="color: #b8860b; font-weight: bold;">Mô hình 3D: Trống đồng</span>
            </button>

            <button onclick="toggleMusic(); toggleFabMenu();" class="glass-btn" id="musicBtn">
                <span style="font-size: 18px;">🎵</span> <span id="musicText">Bật Nhạc Nền</span>
            </button>

            <button onclick="toggleWeather(); toggleFabMenu();" class="glass-btn" id="weatherBtn">
                <span style="font-size: 18px;">🌧️</span> <span id="weatherText">Thời Tiết: Tắt</span>
            </button>

            <button onclick="readSelectedText(); toggleFabMenu();" class="glass-btn">
                <span style="font-size: 18px;">🔊</span> <span>Đọc văn bản (bôi đen)</span>
            </button>

        </div>

        <!-- Main FAB Button -->
        <button id="mainFabBtn" onclick="toggleFabMenu()" style="background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 26px; cursor: pointer; box-shadow: 0 10px 25px rgba(253, 160, 133, 0.5); display: flex; justify-content: center; align-items: center; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
            <span id="fabIcon" style="transition: transform 0.4s ease;">★</span>
        </button>
    </div>

    <script>
        // === 0. FAB Menu & Music Logic ===
        let isFabOpen = false;
        function toggleFabMenu() {
            const menu = document.getElementById('customFabMenu');
            const icon = document.getElementById('fabIcon');
            isFabOpen = !isFabOpen;
            
            if (isFabOpen) {
                menu.style.display = 'flex';
                // Trigger reflow
                void menu.offsetWidth;
                menu.style.opacity = '1';
                menu.style.transform = 'translateY(0) scale(1)';
                icon.style.transform = 'rotate(45deg)';
                icon.innerHTML = '✕';
            } else {
                menu.style.opacity = '0';
                menu.style.transform = 'translateY(20px) scale(0.9)';
                icon.style.transform = 'rotate(0)';
                
                setTimeout(function() {
                    menu.style.display = 'none';
                    icon.innerHTML = '★';
                }, 300);
            }
        }

        function toggleMusic() {
            const audio = document.getElementById('bgMusic');
            const musicText = document.getElementById('musicText');
            if (audio.paused) {
                audio.play();
                musicText.innerText = 'Tắt Nhạc Nền';
            } else {
                audio.pause();
                musicText.innerText = 'Bật Nhạc Nền';
            }
        }

        // === 1. Background Logic ===
        let bgState = 0; // 0: Tối, 1: Sáng, 2: Ảnh nền VTC Hợp tác
        const backgrounds = [
            { bg: '#323232', img: 'none', text: 'Đổi Nền: Tối' },
            { bg: '#f0f2f5', img: 'none', text: 'Đổi Nền: Sáng' },
            { bg: 'transparent', img: 'url("https://images.unsplash.com/photo-1541829070764-84a7d30dd3f3?q=80&w=1920&auto=format&fit=crop")', text: 'Đổi Nền: Cảnh Trường' }
        ];

        function cycleBackground() {
            bgState = (bgState + 1) % backgrounds.length;
            const currentObj = backgrounds[bgState];
            
            document.body.style.backgroundColor = currentObj.bg;
            document.body.style.backgroundImage = currentObj.img;
            
            // Cập nhật text cho trạng thái tiếp theo
            const nextObj = backgrounds[(bgState + 1) % backgrounds.length];
            document.getElementById('bgText').innerText = nextObj.text;
            
            // Xóa tạm hình nền đen mặc định của loading (nếu có)
            let tmpLoading = document.getElementById("tmpLoading");
            if(tmpLoading) tmpLoading.style.background = "transparent";
        }

        // === 2. Audio Logic ===
        let isPlaying = false;
        let hasInteracted = false;
        const myAudio = document.getElementById("bgMusic");
        myAudio.volume = 0.3; // Nhạc dịu nhẹ 30%

        function toggleMusic() {
            if (isPlaying) {
                myAudio.pause();
                document.getElementById('musicText').innerText = "Bật Nhạc Nền";
            } else {
                myAudio.play().catch(e => console.log("Audio play blocked by browser."));
                document.getElementById('musicText').innerText = "Tắt Nhạc Nền";
            }
            isPlaying = !isPlaying;
        }

        // Tự động phát khi người dùng nhấn bất kỳ đâu lần đầu trên sách
        document.body.addEventListener('click', function() {
            if(!hasInteracted && !isPlaying) {
                hasInteracted = true;
                toggleMusic();
            }
        }, { once: true });


        // === 3. FAB Menu Logic ===
        function toggleFabMenu() {
            var menu = document.getElementById('customFabMenu');
            var icon = document.getElementById('fabIcon');
            var btn = document.getElementById('mainFabBtn');
            
            if (menu.style.display === 'none' || menu.style.display === '') {
                menu.style.display = 'flex';
                // Trigger reflow
                void menu.offsetWidth;
                menu.style.opacity = '1';
                menu.style.transform = 'translateY(0) scale(1)';
                icon.innerHTML = '✕';
                icon.style.transform = 'rotate(135deg)';
                btn.style.boxShadow = '0 10px 30px rgba(79, 172, 254, 0.6)';
            } else {
                menu.style.opacity = '0';
                menu.style.transform = 'translateY(20px) scale(0.9)';
                icon.style.transform = 'rotate(0deg)';
                btn.style.boxShadow = '0 10px 25px rgba(0, 242, 254, 0.5)';
                setTimeout(function() {
                    menu.style.display = 'none';
                    icon.innerHTML = '★';
                }, 300);
            }
        }
    </script>

    <!-- AI Chat Assistant Widget -->
    <div id="aiChatWidgetContainer" style="position: fixed; bottom: 30px; right: 30px; z-index: 999999; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
        
        <!-- Chat Icon -->
        <button id="aiChatIconBtn" onclick="toggleChatWindow()" style="width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; background: white; box-shadow: 0 5px 20px rgba(0,0,0,0.2); display: flex; justify-content: center; align-items: center; padding: 0; transition: transform 0.3s ease; position: relative; overflow: hidden;">
            <img src="https://cdn-icons-png.flaticon.com/512/4712/4712010.png" alt="AI Avatar" style="width: 40px; height: 40px; object-fit: cover; opacity: 0.9;" />
            <span style="position: absolute; top: 0; right: 0; width: 14px; height: 14px; background: #ff3b30; border-radius: 50%; border: 2px solid white; display: block;"></span> 
        </button>

        <!-- Chat Window -->
        <div id="aiChatWindow" style="display: none; position: absolute; bottom: 80px; right: 0; width: 360px; height: 500px; background: #ffffff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); flex-direction: column; overflow: hidden; border: 1px solid #e5e7eb; transform-origin: bottom right; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
            
            <!-- Header -->
            <div style="padding: 15px 20px; border-bottom: 1px solid #f3f4f6; display: flex; justify-content: space-between; align-items: center; background: #ffffff;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-weight: 800; font-size: 18px; background: -webkit-linear-gradient(45deg, #FF3366, #ff7e5f, #8E2DE2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Ai</span>
                    <span style="font-weight: 600; color: #111827; font-size: 16px;">Thầy Đức Lịch sử</span>
                </div>
                <button onclick="toggleChatWindow()" style="background: none; border: none; color: #6b7280; font-size: 22px; cursor: pointer; padding: 0; line-height: 1;">✕</button>
            </div>

            <!-- Messages Area -->
            <div id="aiChatMessages" style="flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #fafafa;">
                <!-- Welcome Message -->
                <div style="display: flex; gap: 10px; align-items: flex-start;">
                    <span style="font-size: 20px;">👋</span>
                    <div style="background: white; padding: 12px 16px; border-radius: 0 16px 16px 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); color: #374151; font-size: 14px; line-height: 1.5; border: 1px solid #f3f4f6;">
                        Chào Em. Em hỏi Thầy Đức nội dung gì?
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div style="padding: 15px; background: white; border-top: 1px solid #f3f4f6;">
                <div style="display: flex; background: white; border: 1px solid #e5e7eb; border-radius: 24px; padding: 5px 15px; align-items: center; transition: all 0.3s; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);" id="aiInputWrapper">
                    
                    <button style="background: none; border: none; color: #6b7280; cursor: pointer; display: flex; align-items: center; padding: 5px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21v-7" /><path d="M4 10V3" /><path d="M12 21v-9" /><path d="M12 8V3" /><path d="M20 21v-5" /><path d="M20 12V3" /><path d="M1 14h6" /><path d="M9 8h6" /><path d="M17 16h6" /></svg>
                    </button>
                    
                    <input type="text" id="aiChatInput" placeholder="Hãy hỏi những gì trong nội dung môn học nhé" style="flex: 1; border: none; outline: none; padding: 10px 8px; font-size: 13px; color: #1f2937; background: transparent;" onkeypress="if(event.key === 'Enter') sendChatMessage()" />
                    
                    <div style="display: flex; gap: 5px; align-items: center;">
                        <button style="background: none; border: none; color: #6b7280; cursor: pointer; display: flex; align-items: center; padding: 5px;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" /><path d="M19 10v2a7 7 0 0 1-14 0v-2" /><line x1="12" y1="19" x2="12" y2="23" /><line x1="8" y1="23" x2="16" y2="23" /></svg>
                        </button>
                        <button onclick="sendChatMessage()" style="background: #e5e7eb; border: none; border-radius: 50%; width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: white; transition: background 0.3s;" id="aiSendBtn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" /></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // AI Chat UI Logic
        function toggleChatWindow() {
            const chatWindow = document.getElementById('aiChatWindow');
            const iconBtn = document.getElementById('aiChatIconBtn');
            if (chatWindow.style.display === 'none' || chatWindow.style.display === '') {
                chatWindow.style.display = 'flex';
                setTimeout(() => {
                    chatWindow.style.opacity = '1';
                    chatWindow.style.transform = 'scale(1)';
                }, 10);
                iconBtn.style.transform = 'scale(0.9)';
            } else {
                chatWindow.style.opacity = '0';
                chatWindow.style.transform = 'scale(0.95) translateY(10px)';
                setTimeout(() => {
                    chatWindow.style.display = 'none';
                }, 300);
                iconBtn.style.transform = 'scale(1)';
            }
        }

        const chatInput = document.getElementById('aiChatInput');
        const sendBtn = document.getElementById('aiSendBtn');
        const inputWrapper = document.getElementById('aiInputWrapper');
        
        chatInput.addEventListener('input', function() {
            if (this.value.trim().length > 0) {
                sendBtn.style.background = '#4facfe'; // Activate send button
            } else {
                sendBtn.style.background = '#e5e7eb'; // Deactivate
            }
        });

        chatInput.addEventListener('focus', function() {
            inputWrapper.style.borderColor = '#4facfe';
            inputWrapper.style.boxShadow = '0 0 0 2px rgba(79, 172, 254, 0.2)';
        });

        chatInput.addEventListener('blur', function() {
            inputWrapper.style.borderColor = '#e5e7eb';
            inputWrapper.style.boxShadow = 'inset 0 1px 3px rgba(0,0,0,0.05)';
        });

        function sendChatMessage() {
            const msg = chatInput.value.trim();
            if(!msg) return;

            // Add User Message
            const msgsArea = document.getElementById('aiChatMessages');
            const userMsgHTML = `
                <div style="display: flex; gap: 10px; align-items: flex-end; justify-content: flex-end;">
                    <div style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); padding: 10px 16px; border-radius: 16px 16px 0 16px; color: white; font-size: 14px; line-height: 1.5; max-width: 85%; word-wrap: break-word; box-shadow: 0 4px 10px rgba(0, 242, 254, 0.2);">
                        ${msg.replace(/</g, "&lt;").replace(/>/g, "&gt;")}
                    </div>
                </div>
            `;
            msgsArea.insertAdjacentHTML('beforeend', userMsgHTML);
            chatInput.value = '';
            sendBtn.style.background = '#e5e7eb';
            
            // Scroll to bottom
            msgsArea.scrollTop = msgsArea.scrollHeight;

            // Show typing indicator
            const typingId = 'typing_' + Date.now();
            const typingHTML = `
                <div id="${typingId}" style="display: flex; gap: 10px; align-items: flex-start; margin-top: 5px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712010.png" width="24" height="24" style="object-fit: contain;" />
                    <div style="background: white; padding: 12px 16px; border-radius: 0 16px 16px 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); color: #9ca3af; font-size: 14px; border: 1px solid #f3f4f6; display: flex; gap: 4px; align-items: center;">
                        <span style="animation: blink 1s infinite alternate; width: 6px; height: 6px; background: #9ca3af; border-radius: 50%; display: inline-block;"></span>
                        <span style="animation: blink 1s infinite alternate 0.2s; width: 6px; height: 6px; background: #9ca3af; border-radius: 50%; display: inline-block;"></span>
                        <span style="animation: blink 1s infinite alternate 0.4s; width: 6px; height: 6px; background: #9ca3af; border-radius: 50%; display: inline-block;"></span>
                    </div>
                </div>
            `;
            msgsArea.insertAdjacentHTML('beforeend', typingHTML);
            msgsArea.scrollTop = msgsArea.scrollHeight;

            if (!document.getElementById('typingStyles')) {
                document.head.insertAdjacentHTML('beforeend', `<style id="typingStyles">@keyframes blink { 0% { opacity: 0.3; } 100% { opacity: 1; } }</style>`);
            }

            // Fake AI Response logic
            setTimeout(() => {
                const typingEl = document.getElementById(typingId);
                if(typingEl) typingEl.remove();
                
                let reply = "Đây là phiên bản offline của Thầy Đức Lịch Sử. Để trải nghiệm tính năng hỏi đáp AI thời gian thực, thầy vui lòng xuất bản lên hệ thống nhé!";
                let lowerMsg = msg.toLowerCase();
                
                if (lowerMsg.includes("trần hưng đạo") || lowerMsg.includes("nhà trần") || lowerMsg.includes("bạch đằng") || lowerMsg.includes("1288")) {
                    reply = "Nhà Trần là triều đại hiển hách trong thời kỳ phong kiến Việt Nam với 3 lần đánh bại quân Mông - Nguyên. Tiêu biểu là Hưng Đạo Vương Trần Quốc Tuấn với chiến công lẫy lừng trên sông Bạch Đằng (năm 1288). Em muốn tìm hiểu thêm về trận chiến này không?";
                } else if (lowerMsg.includes("chào") || lowerMsg.includes("hello")) {
                    reply = "Chào em! Hôm nay em muốn ôn tập chuyên đề Lịch sử hay Địa lý nào? Cứ hỏi thầy nhé.";
                } else if (lowerMsg.includes("ngô quyền") || lowerMsg.includes("938")) {
                    reply = "Năm 938, Ngô Quyền đã lãnh đạo nhân dân ta đánh bại quân Nam Hán trên sông Bạch Đằng, chấm dứt hơn 1000 năm chịu ách đô hộ của phong kiến phương Bắc, mở ra kỷ nguyên độc lập lâu dài cho dân tộc.";
                } else if (lowerMsg.includes("hai bà trưng")) {
                    reply = "Khởi nghĩa Hai Bà Trưng (năm 40 - 43) là cuộc khởi nghĩa lớn đầu tiên trong thời kỳ Bắc thuộc, mở đầu cho thời kỳ đấu tranh giành độc lập của dân tộc ta.";
                } else if (lowerMsg.includes("lý") || lowerMsg.includes("thăng long")) {
                    reply = "Nhà Lý bắt đầu từ năm 1009 khi Lý Công Uẩn lên ngôi. Sự kiện nổi bật nhất là vua Lý Thái Tổ quyết định dời đô từ Hoa Lư về thành Đại La và đổi tên thành Thăng Long vào năm 1010.";
                }

                const aiResHTML = `
                    <div style="display: flex; gap: 10px; align-items: flex-start; margin-top: 10px;">
                        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712010.png" width="28" height="28" style="object-fit: contain;" />
                        <div style="background: white; padding: 12px 16px; border-radius: 0 16px 16px 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); color: #374151; font-size: 14px; line-height: 1.5; border: 1px solid #f3f4f6; max-width: 85%;">
                            ${reply}
                        </div>
                    </div>
                `;
                msgsArea.insertAdjacentHTML('beforeend', aiResHTML);
                msgsArea.scrollTop = msgsArea.scrollHeight;
            }, 1200 + Math.random() * 800); // Random typing delay 1.2s - 2s
        }
    </script>
